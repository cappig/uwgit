<div class="code-viewer">
    <div class="code-scroll">
        <div class="code-rows">
        {% for line in lines %}
        <div class="code-row {{ line.class }}">
            <div class="line-num"><span class="line-num-inner">{{ line.num }}</span></div>
            <div class="line-code"><pre class="line-code-inner">{{ line.text }}</pre></div>
        </div>
        {% endfor %}
        </div>
    </div>
</div>
