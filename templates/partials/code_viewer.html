<div class="code-viewer">
    <div class="code-scroll">
        <div class="code-rows">
        {% for line in lines %}
        <div class="code-row {{ line.class }}">
            <div class="line-num">{{ line.num }}</div>
            <div class="line-code"><pre>{{ line.text }}</pre></div>
        </div>
        {% endfor %}
        </div>
    </div>
</div>
